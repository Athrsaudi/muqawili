<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: Tajawal, sans-serif;
  background: #111827;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 48px;
  padding: 48px;
}
.label { color: #6b7280; font-size: 14px; }
.dark-bg {
  background: #1A0F00;
  padding: 48px 72px;
  border-radius: 24px;
  border: 1px solid rgba(200,146,42,0.35);
  box-shadow: 0 0 80px rgba(200,146,42,0.06);
}
.light-bg {
  background: #FFF8EE;
  padding: 48px 72px;
  border-radius: 24px;
  border: 1px solid rgba(200,146,42,0.25);
}
</style>
</head>
<body>

<p class="label">الشعار — خلفية داكنة</p>
<div class="dark-bg">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100" width="360" height="100">
    <defs>
      <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%"   stop-color="#C8922A"/>
        <stop offset="50%"  stop-color="#E8B84B"/>
        <stop offset="100%" stop-color="#A67420"/>
      </linearGradient>
      <linearGradient id="iconbg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%"   stop-color="#2D1A00"/>
        <stop offset="100%" stop-color="#1A0F00"/>
      </linearGradient>
    </defs>

    <!-- ─── أيقونة البرج (يسار) ─── -->
    <rect x="6" y="6" width="88" height="88" rx="18" fill="url(#iconbg)" stroke="url(#gold)" stroke-width="1.5"/>

    <!-- شرفات نجدية فوق البرج -->
    <rect x="24" y="30" width="10" height="10" rx="2" fill="url(#gold)"/>
    <rect x="40" y="22" width="12" height="18" rx="2" fill="url(#gold)"/>
    <rect x="58" y="30" width="10" height="10" rx="2" fill="url(#gold)"/>

    <!-- جسم البرج -->
    <rect x="22" y="38" width="48" height="38" rx="3" fill="url(#gold)" fill-opacity=".12" stroke="url(#gold)" stroke-width="1.3"/>

    <!-- نافذة روشن حجازية -->
    <rect x="34" y="46" width="24" height="16" rx="3" fill="none" stroke="url(#gold)" stroke-width="1.1"/>
    <path d="M34 54 Q46 44 58 54" fill="none" stroke="url(#gold)" stroke-width="1.1"/>
    <line x1="46" y1="44" x2="46" y2="62" stroke="url(#gold)" stroke-width=".8" stroke-opacity=".55"/>

    <!-- نجمة ثمانية أعلى -->
    <g transform="translate(46,16)">
      <polygon points="0,-6 1.8,-1.8 6,0 1.8,1.8 0,6 -1.8,1.8 -6,0 -1.8,-1.8" fill="url(#gold)" opacity=".85"/>
      <circle r="2.2" fill="url(#gold)"/>
    </g>

    <!-- زخرفة سفلية -->
    <line x1="18" y1="80" x2="74" y2="80" stroke="url(#gold)" stroke-width=".8" stroke-opacity=".3"/>
    <circle cx="46" cy="80" r="2"   fill="url(#gold)" fill-opacity=".7"/>
    <circle cx="32" cy="80" r="1.2" fill="url(#gold)" fill-opacity=".4"/>
    <circle cx="60" cy="80" r="1.2" fill="url(#gold)" fill-opacity=".4"/>

    <!-- ─── النص (يمين الأيقونة) ─── -->
    <!-- "خدماتي" -->
    <text
      x="108" y="52"
      font-family="Tajawal, Arial, sans-serif"
      font-size="32" font-weight="800"
      fill="url(#gold)"
      dominant-baseline="auto"
    >خدماتي</text>

    <!-- فاصل رفيع -->
    <line x1="108" y1="60" x2="300" y2="60" stroke="url(#gold)" stroke-width=".7" stroke-opacity=".25"/>

    <!-- "سوق الخدمات السعودي" -->
    <text
      x="109" y="76"
      font-family="Tajawal, Arial, sans-serif"
      font-size="13" font-weight="400"
      fill="#A67420"
      fill-opacity=".9"
    >سوق الخدمات السعودي</text>
  </svg>
</div>

<p class="label">الشعار — خلفية فاتحة</p>
<div class="light-bg">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100" width="360" height="100">
    <defs>
      <linearGradient id="gold2" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%"   stop-color="#C8922A"/>
        <stop offset="50%"  stop-color="#E8B84B"/>
        <stop offset="100%" stop-color="#A67420"/>
      </linearGradient>
      <linearGradient id="iconbg2" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%"   stop-color="#2D1A00"/>
        <stop offset="100%" stop-color="#1A0F00"/>
      </linearGradient>
    </defs>

    <rect x="6" y="6" width="88" height="88" rx="18" fill="url(#iconbg2)" stroke="url(#gold2)" stroke-width="1.5"/>
    <rect x="24" y="30" width="10" height="10" rx="2" fill="url(#gold2)"/>
    <rect x="40" y="22" width="12" height="18" rx="2" fill="url(#gold2)"/>
    <rect x="58" y="30" width="10" height="10" rx="2" fill="url(#gold2)"/>
    <rect x="22" y="38" width="48" height="38" rx="3" fill="url(#gold2)" fill-opacity=".12" stroke="url(#gold2)" stroke-width="1.3"/>
    <rect x="34" y="46" width="24" height="16" rx="3" fill="none" stroke="url(#gold2)" stroke-width="1.1"/>
    <path d="M34 54 Q46 44 58 54" fill="none" stroke="url(#gold2)" stroke-width="1.1"/>
    <line x1="46" y1="44" x2="46" y2="62" stroke="url(#gold2)" stroke-width=".8" stroke-opacity=".55"/>
    <g transform="translate(46,16)">
      <polygon points="0,-6 1.8,-1.8 6,0 1.8,1.8 0,6 -1.8,1.8 -6,0 -1.8,-1.8" fill="url(#gold2)" opacity=".85"/>
      <circle r="2.2" fill="url(#gold2)"/>
    </g>
    <line x1="18" y1="80" x2="74" y2="80" stroke="url(#gold2)" stroke-width=".8" stroke-opacity=".3"/>
    <circle cx="46" cy="80" r="2"   fill="url(#gold2)" fill-opacity=".7"/>
    <circle cx="32" cy="80" r="1.2" fill="url(#gold2)" fill-opacity=".4"/>
    <circle cx="60" cy="80" r="1.2" fill="url(#gold2)" fill-opacity=".4"/>

    <text x="108" y="52" font-family="Tajawal, Arial, sans-serif" font-size="32" font-weight="800" fill="url(#gold2)">خدماتي</text>
    <line x1="108" y1="60" x2="300" y2="60" stroke="url(#gold2)" stroke-width=".7" stroke-opacity=".2"/>
    <text x="109" y="76" font-family="Tajawal, Arial, sans-serif" font-size="13" font-weight="400" fill="#A67420" fill-opacity=".9">سوق الخدمات السعودي</text>
  </svg>
</div>

</body>
</html>
