<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Tajawal, sans-serif; background: #111827; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 40px; padding: 48px; }
.label { color: #6b7280; font-size: 13px; }
.dark-bg { background: #1A0F00; padding: 40px 60px; border-radius: 20px; border: 1px solid rgba(200,146,42,0.3); box-shadow: 0 0 60px rgba(200,146,42,0.08); }
.light-bg { background: #FFF8EE; padding: 40px 60px; border-radius: 20px; border: 1px solid rgba(200,146,42,0.2); }
</style>
</head>
<body>
<p class="label">على خلفية داكنة</p>
<div class="dark-bg">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" fill="none" width="300">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C8922A"/>
      <stop offset="50%" stop-color="#E8B84B"/>
      <stop offset="100%" stop-color="#A67420"/>
    </linearGradient>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0F00"/>
      <stop offset="100%" stop-color="#2D1A00"/>
    </linearGradient>
  </defs>
  <!-- أيقونة البرج -->
  <rect x="4" y="4" width="72" height="72" rx="14" fill="url(#bg1)"/>
  <rect x="4" y="4" width="72" height="72" rx="14" fill="none" stroke="url(#g1)" stroke-width="1.5"/>
  <!-- شرفات نجدية -->
  <rect x="22" y="26" width="8" height="8" rx="1.5" fill="url(#g1)" opacity=".9"/>
  <rect x="32" y="20" width="10" height="14" rx="1.5" fill="url(#g1)"/>
  <rect x="44" y="26" width="8" height="8" rx="1.5" fill="url(#g1)" opacity=".9"/>
  <!-- جسم البرج -->
  <rect x="20" y="32" width="40" height="28" rx="2" fill="url(#g1)" opacity=".12"/>
  <rect x="20" y="32" width="40" height="28" rx="2" fill="none" stroke="url(#g1)" stroke-width="1.2"/>
  <!-- نافذة روشن -->
  <rect x="30" y="38" width="20" height="13" rx="2" fill="none" stroke="url(#g1)" stroke-width="1"/>
  <path d="M30 44.5 Q40 38 50 44.5" fill="none" stroke="url(#g1)" stroke-width="1"/>
  <line x1="40" y1="38" x2="40" y2="51" stroke="url(#g1)" stroke-width=".8" opacity=".5"/>
  <!-- نجمة ثمانية -->
  <g transform="translate(40,14)">
    <polygon points="0,-5 1.5,-1.5 5,0 1.5,1.5 0,5 -1.5,1.5 -5,0 -1.5,-1.5" fill="url(#g1)" opacity=".8"/>
    <circle r="2" fill="url(#g1)"/>
  </g>
  <!-- زخرفة سفلية -->
  <line x1="16" y1="65" x2="64" y2="65" stroke="url(#g1)" stroke-width=".8" opacity=".35"/>
  <circle cx="40" cy="65" r="1.5" fill="url(#g1)" opacity=".7"/>
  <circle cx="28" cy="65" r="1" fill="url(#g1)" opacity=".4"/>
  <circle cx="52" cy="65" r="1" fill="url(#g1)" opacity=".4"/>
  <!-- النص -->
  <text x="86" y="44" font-family="Tajawal,sans-serif" font-size="28" font-weight="800" fill="url(#g1)">خدماتي</text>
  <text x="87" y="60" font-family="Tajawal,sans-serif" font-size="11" fill="#A67420" opacity=".9">سوق الخدمات السعودي</text>
  <!-- فاصل عمودي -->
  <line x1="83" y1="48" x2="83" y2="57" stroke="url(#g1)" stroke-width="1" opacity=".3"/>
</svg>
</div>

<p class="label">على خلفية فاتحة</p>
<div class="light-bg">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" fill="none" width="300">
  <defs>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C8922A"/>
      <stop offset="50%" stop-color="#E8B84B"/>
      <stop offset="100%" stop-color="#A67420"/>
    </linearGradient>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0F00"/>
      <stop offset="100%" stop-color="#2D1A00"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="72" height="72" rx="14" fill="url(#bg2)"/>
  <rect x="4" y="4" width="72" height="72" rx="14" fill="none" stroke="url(#g2)" stroke-width="1.5"/>
  <rect x="22" y="26" width="8" height="8" rx="1.5" fill="url(#g2)" opacity=".9"/>
  <rect x="32" y="20" width="10" height="14" rx="1.5" fill="url(#g2)"/>
  <rect x="44" y="26" width="8" height="8" rx="1.5" fill="url(#g2)" opacity=".9"/>
  <rect x="20" y="32" width="40" height="28" rx="2" fill="url(#g2)" opacity=".12"/>
  <rect x="20" y="32" width="40" height="28" rx="2" fill="none" stroke="url(#g2)" stroke-width="1.2"/>
  <rect x="30" y="38" width="20" height="13" rx="2" fill="none" stroke="url(#g2)" stroke-width="1"/>
  <path d="M30 44.5 Q40 38 50 44.5" fill="none" stroke="url(#g2)" stroke-width="1"/>
  <line x1="40" y1="38" x2="40" y2="51" stroke="url(#g2)" stroke-width=".8" opacity=".5"/>
  <g transform="translate(40,14)">
    <polygon points="0,-5 1.5,-1.5 5,0 1.5,1.5 0,5 -1.5,1.5 -5,0 -1.5,-1.5" fill="url(#g2)" opacity=".8"/>
    <circle r="2" fill="url(#g2)"/>
  </g>
  <line x1="16" y1="65" x2="64" y2="65" stroke="url(#g2)" stroke-width=".8" opacity=".35"/>
  <circle cx="40" cy="65" r="1.5" fill="url(#g2)" opacity=".7"/>
  <circle cx="28" cy="65" r="1" fill="url(#g2)" opacity=".4"/>
  <circle cx="52" cy="65" r="1" fill="url(#g2)" opacity=".4"/>
  <text x="86" y="44" font-family="Tajawal,sans-serif" font-size="28" font-weight="800" fill="url(#g2)">خدماتي</text>
  <text x="87" y="60" font-family="Tajawal,sans-serif" font-size="11" fill="#A67420" opacity=".9">سوق الخدمات السعودي</text>
  <line x1="83" y1="48" x2="83" y2="57" stroke="url(#g2)" stroke-width="1" opacity=".3"/>
</svg>
</div>
</body>
</html>
